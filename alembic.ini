# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# prepend the current directory to sys.path
prepend_sys_path = true

# version path separator; defaults to OS-specific path separator
# version_path_separator = :

# set to 'true' to run the environment during the 'revision' command, regardless of autogenerate
# revision_environment = false

logging_config_defaults = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(name)s] %(levelname)-5s: %(message)s
datefmt = %H:%M:%S
