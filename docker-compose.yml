version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: saarthi-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: saarthi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saarthi"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saarthi-backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/saarthi
      - CORS_ORIGINS=["http://localhost:3000", "http://localhost:5173"]
      - PORT=4000
      - HOST=0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
